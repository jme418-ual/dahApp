<ion-header>
  <ion-toolbar>
    <ion-title>Mis Productos</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="goToAddProduct()">
        <ion-icon slot="icon-only" name="add"></ion-icon>
      </ion-button>
      <div class="vertical-divider"></div>
      <ion-button (click)="logout()">
        <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    @for (product of productsService.myProducts(); track product.id) {
    <ion-item>
      <ion-thumbnail slot="start">
        <img [src]="product.imageUrl" [alt]="product.name"/>
      </ion-thumbnail>
      <ion-label>
        <h2>{{ product.name }}</h2>
        <p>{{ product.description }}</p>
      </ion-label>
	
      <ion-buttons slot="end">
        <ion-button fill="clear" (click)="goToDetail(product.id!)">
          <ion-icon name="eye-outline"></ion-icon>
        </ion-button>

        <ion-button fill="clear" color="danger" (click)="confirmDelete(product.id!)">
          <ion-icon name="trash-outline"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-item>
    } @empty {
      <ion-item>No tienes productos registrados.</ion-item>
    }
  </ion-list>
</ion-content>
