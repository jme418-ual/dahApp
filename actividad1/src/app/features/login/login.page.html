
<ion-content [fullscreen]="true">
  <div class="content-wrapper">
    <div class="login-container">
      <!-- Logo or App Name -->
      <div class="app-header">
        <h1 class="app-name">dahApp</h1>
        <p class="app-subtitle">Sistema de Gestión</p>
      </div>

      <!-- Login Card -->
      <ion-card class="login-card">
        <ion-card-header>
          <ion-card-title>Iniciar Sesión</ion-card-title>
        </ion-card-header>

        <ion-card-content>
          <form (ngSubmit)="login()">
            <!-- Username Input -->
            <ion-item class="form-item">
              <ion-icon name="person" slot="start" color="primary"></ion-icon>
              <ion-input
                [(ngModel)]="username"
                name="username"
                type="text"
                autocomplete="username"
                required
                placeholder="Usuario"
              ></ion-input>
            </ion-item>

            <!-- Password Input -->
            <ion-item class="form-item">
              <ion-icon name="lock-closed" slot="start" color="primary"></ion-icon>
              <ion-input
                [(ngModel)]="password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
                placeholder="Contraseña"
              ></ion-input>
            </ion-item>


            <!-- Login Button -->
            <ion-button
              expand="block"
              type="submit"
              color="primary"
              [disabled]="!isFormValid()"
              class="login-button"
            >
              <ion-icon name="log-in" slot="start"></ion-icon>
              Iniciar Sesión
            </ion-button>
          </form>
        </ion-card-content>
      </ion-card>
    </div>
  </div>
</ion-content>
